<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMS — Korisničko uputstvo</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f0f4f8;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.header {
  background: #1a2332;
  padding: 0 20px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.sidebar-toggle {
  background: none; border: none;
  color: rgba(255,255,255,0.5);
  cursor: pointer; padding: 6px;
  border-radius: 6px;
  transition: all 0.15s;
  display: flex; align-items: center;
  line-height: 1;
}
.sidebar-toggle:hover { color: #fff; background: rgba(255,255,255,0.08); }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #3B82F6; }
.logo-text { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.04em; }
.step-counter { font-size: 12px; color: rgba(255,255,255,0.4); }

.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.sidebar {
  width: 260px;
  background: #fff;
  border-right: 1px solid #e8ecf0;
  overflow-y: auto;
  flex-shrink: 0;
  transition: width 0.25s ease, opacity 0.25s ease;
}
.sidebar.collapsed {
  width: 0;
  opacity: 0;
  overflow: hidden;
  border-right: none;
}
.sidebar-inner { padding: 12px; min-width: 260px; }

.module-label {
  font-size: 10px; font-weight: 700;
  color: #a0aec0; text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 10px 8px 4px;
}
.sidebar-step {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
}
.sidebar-step:hover { background: #EFF6FF; }
.sidebar-step.active { background: #DBEAFE; }
.sidebar-step-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #f0f4f8;
  font-size: 10px; font-weight: 700;
  color: #718096;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.sidebar-step.active .sidebar-step-num { background: #2563EB; color: #fff; }
.sidebar-step-title {
  font-size: 12px; color: #4a5568;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sidebar-step.active .sidebar-step-title { color: #1D4ED8; font-weight: 600; }

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: all 0.25s ease;
}

.content {
  flex: 1;
  overflow-y: auto;
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  max-width: 860px;
  width: 100%;
  margin: 0 auto;
}

.module-badge {
  display: inline-flex;
  font-size: 11px; font-weight: 700;
  padding: 4px 12px; border-radius: 20px;
  background: #DBEAFE; color: #1D4ED8;
}

.step-title {
  font-size: 24px; font-weight: 700;
  color: #1a2332; line-height: 1.3;
}

.image-area {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 180px;
}
.image-area img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
}
.image-placeholder {
  color: #cbd5e0;
  font-size: 13px;
  padding: 48px;
  text-align: center;
  line-height: 1.8;
}

.step-text {
  font-size: 15px; color: #4a5568;
  line-height: 1.85;
}

.nav-bar {
  background: #fff;
  border-top: 1px solid #e8ecf0;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.progress-wrap { flex: 1; margin: 0 24px; }
.progress-track {
  height: 4px; background: #e8ecf0;
  border-radius: 4px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: #2563EB;
  border-radius: 4px;
  transition: width 0.35s ease;
}
.progress-label {
  font-size: 11px; color: #a0aec0;
  text-align: center; margin-top: 5px;
}

.btn {
  padding: 9px 22px;
  border-radius: 9px;
  font-size: 13px; font-weight: 600;
  cursor: pointer; border: none;
  transition: all 0.15s;
}
.btn-prev {
  background: #fff; color: #4a5568;
  border: 1px solid #e2e8f0;
}
.btn-prev:hover:not(:disabled) { background: #f8fafc; }
.btn-prev:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-next { background: #2563EB; color: #fff; }
.btn-next:hover { background: #1D4ED8; }

.loading-state {
  display: flex; align-items: center; justify-content: center;
  flex: 1; color: #a0aec0; font-size: 14px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Prikaži/sakrij meni">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="2" y1="4" x2="16" y2="4"/>
        <line x1="2" y1="9" x2="16" y2="9"/>
        <line x1="2" y1="14" x2="16" y2="14"/>
      </svg>
    </button>
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">TMS — Korisničko uputstvo</span>
    </div>
  </div>
  <span class="step-counter" id="counter"></span>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-inner" id="sidebar-inner">
      <div style="padding:20px;color:#a0aec0;font-size:12px;">Učitavam...</div>
    </div>
  </div>
  <div class="main">
    <div class="content" id="content">
      <div class="loading-state">Učitavam korake...</div>
    </div>
    <div class="nav-bar">
      <button class="btn btn-prev" id="btn-prev" onclick="go(-1)" disabled>← Nazad</button>
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <div class="progress-label" id="progress-label"></div>
      </div>
      <button class="btn btn-next" id="btn-next" onclick="go(1)">Sledeće →</button>
    </div>
  </div>
</div>

<script>
const STEPS_URL = 'https://raw.githubusercontent.com/millosbgd/TMSGuideTour/main/steps.json';

let steps = [];
let current = 0;
let sidebarOpen = true;

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
}

async function init() {
  try {
    const res = await fetch(STEPS_URL + '?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    steps = await res.json();
    if (!steps.length) throw new Error('Nema koraka');
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="loading-state">Greška pri učitavanju koraka.<br><small style="color:#cbd5e0;margin-top:8px;display:block;">${e.message}</small></div>`;
    document.getElementById('sidebar-inner').innerHTML = '';
  }
}

function renderSidebar() {
  const el = document.getElementById('sidebar-inner');
  const groups = {};
  steps.forEach((s, i) => {
    const m = s.module || 'Opšte';
    if (!groups[m]) groups[m] = [];
    groups[m].push({ ...s, idx: i });
  });

  el.innerHTML = Object.entries(groups).map(([module, stps]) => `
    <div class="module-label">${module}</div>
    ${stps.map(s => `
      <div class="sidebar-step ${s.idx === current ? 'active' : ''}" onclick="goTo(${s.idx})">
        <div class="sidebar-step-num">${s.idx + 1}</div>
        <div class="sidebar-step-title">${s.title}</div>
      </div>
    `).join('')}
  `).join('');
}

function render() {
  const s = steps[current];
  const total = steps.length;

  document.getElementById('counter').textContent = `${current + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = ((current + 1) / total * 100) + '%';
  document.getElementById('progress-label').textContent = `Korak ${current + 1} od ${total}`;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').textContent = current === total - 1 ? 'Završi ✓' : 'Sledeće →';

  document.getElementById('content').innerHTML = `
    <div><span class="module-badge">${s.module || 'Opšte'}</span></div>
    <h1 class="step-title">${s.title}</h1>
    <div class="image-area">
      ${s.image
        ? `<img src="${s.image}" alt="${s.title}" onerror="this.parentElement.innerHTML='<div class=\'image-placeholder\'>Slika nije dostupna</div>'">`
        : `<div class="image-placeholder">Screenshot još nije dodat za ovaj korak</div>`
      }
    </div>
    <p class="step-text">${s.text}</p>
  `;

  renderSidebar();
  document.querySelector('.sidebar-step.active')?.scrollIntoView({ block: 'nearest' });
}

function go(dir) {
  const next = current + dir;
  if (next >= 0 && next < steps.length) {
    current = next;
    render();
    document.getElementById('content').scrollTop = 0;
  }
}

function goTo(idx) {
  current = idx;
  render();
  document.getElementById('content').scrollTop = 0;
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') go(-1);
});

init();
</script>
</body>
</html>
